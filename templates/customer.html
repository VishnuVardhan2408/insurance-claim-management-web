<!DOCTYPE html>

<html>

<head>

<title>Add Customer</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<h2>🏥 ICMS</h2>

</div>

<div class="container">

<h1>👤 Add Customer</h1>

<form action="/save_customer" method="POST">

<input type="text"
name="customer_id"
placeholder="Customer ID"
required>

<br>

<input type="text"
name="customer_name"
placeholder="Customer Name"
required>

<br>

<input type="email"
name="email"
placeholder="Email"
required>

<br>

<input type="text"
name="phone"
placeholder="Phone Number"
required>

<br>

<input type="text"
name="policy_number"
placeholder="Policy Number"
required>

<br><br>

<button type="submit">

Save Customer

</button>

</form>

<br>

<a href="/">

<button>

🏠 Home

</button>

</a>

</div>

</body>

</html>
