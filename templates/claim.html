<!DOCTYPE html>

<html>

<head>

<title>Submit Claim</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<h2>🏥 ICMS</h2>

</div>

<div class="container">

<h1>📝 Submit Claim</h1>

<form action="/save_claim" method="POST">

<input type="text"
name="claim_id"
placeholder="Claim ID"
required>

<br>

<input type="text"
name="policy_id"
placeholder="Policy ID"
required>

<br>

<input type="number"
name="claim_amount"
placeholder="Claim Amount"
required>

<br>

<input type="text"
name="reason"
placeholder="Claim Reason"
required>

<br><br>

<button type="submit">

Submit Claim

</button>

</form>

<br>

<a href="/">

<button>

🏠 Home

</button>

</a>

</div>

</body>

</html>
